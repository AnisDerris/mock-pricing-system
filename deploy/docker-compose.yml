name: food-pricing

# ─────────────────────────────────────────────────────────────────────────────
# Food Delivery Dynamic Pricing — full local stack
#
# Infra    : Kafka (KRaft), Redis, PostgreSQL
# App      : API (FastAPI + SSE), Producer, 4 Consumers spécialisés
# Monitoring: Prometheus, Loki, Promtail, Grafana
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pricing
      POSTGRES_PASSWORD: pricing
      POSTGRES_DB: foodpricing
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricing -d foodpricing"]
      interval: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.api
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://pricing:pricing@postgres:5432/foodpricing
      KAFKA_BOOTSTRAP: kafka:9092
      LOG_LEVEL: INFO
    ports: ["8000:8000"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    labels:
      logging: promtail

  producer:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.streaming
    command: ["python", "-m", "app.streaming.producer"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      PRODUCER_INTERVAL: "0.8"
      LOG_LEVEL: INFO
    depends_on:
      kafka:
        condition: service_healthy
    labels:
      logging: promtail

  consumer-orders:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.streaming
    command: ["python", "-m", "app.streaming.consumer"]
    environment:
      CONSUMER_TYPE: orders
      KAFKA_BOOTSTRAP: kafka:9092
      REDIS_URL: redis://redis:6379/0
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      logging: promtail

  consumer-drivers:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.streaming
    command: ["python", "-m", "app.streaming.consumer"]
    environment:
      CONSUMER_TYPE: drivers
      KAFKA_BOOTSTRAP: kafka:9092
      REDIS_URL: redis://redis:6379/0
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      logging: promtail

  consumer-restaurants:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.streaming
    command: ["python", "-m", "app.streaming.consumer"]
    environment:
      CONSUMER_TYPE: restaurants
      KAFKA_BOOTSTRAP: kafka:9092
      REDIS_URL: redis://redis:6379/0
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      logging: promtail

  consumer-traffic:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.streaming
    command: ["python", "-m", "app.streaming.consumer"]
    environment:
      CONSUMER_TYPE: traffic
      KAFKA_BOOTSTRAP: kafka:9092
      REDIS_URL: redis://redis:6379/0
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      logging: promtail

  # ── Monitoring ──────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  loki:
    image: grafana/loki:3.0.0
    ports: ["3100:3100"]
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]

  grafana:
    image: grafana/grafana:10.4.2
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus, loki]

volumes:
  postgres_data:
  loki_data:
  grafana_data:

