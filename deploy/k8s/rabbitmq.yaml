apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: pricing
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels: { app: rabbitmq }
  template:
    metadata:
      labels: { app: rabbitmq }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          ports:
            - { containerPort: 5672,  name: amqp }
            - { containerPort: 15672, name: ui }
          readinessProbe:
            exec: { command: ["rabbitmq-diagnostics", "-q", "ping"] }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: pricing
spec:
  selector: { app: rabbitmq }
  ports:
    - { name: amqp, port: 5672,  targetPort: 5672 }
    - { name: ui,   port: 15672, targetPort: 15672 }
