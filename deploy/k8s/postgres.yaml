apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: pricing
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER,     value: "pricing" }
            - { name: POSTGRES_PASSWORD, value: "pricing" }
            - { name: POSTGRES_DB,       value: "foodpricing" }
            - { name: PGDATA,            value: "/var/lib/postgresql/data/pgdata" }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "pricing", "-d", "foodpricing"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - { name: postgres-data, mountPath: /var/lib/postgresql/data }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pricing
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: 5432 }
