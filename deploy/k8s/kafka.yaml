apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: pricing
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          ports:
            - { containerPort: 9092, name: client }
            - { containerPort: 9093, name: controller }
          env:
            - { name: KAFKA_NODE_ID,                         value: "0" }
            - { name: KAFKA_PROCESS_ROLES,                   value: "controller,broker" }
            - { name: KAFKA_LISTENERS,                       value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS,            value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP,  value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS,        value: "0@kafka:9093" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES,       value: "CONTROLLER" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME,      value: "PLAINTEXT" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE,       value: "true" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR,            value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR,    value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR,              value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS,          value: "0" }
          readinessProbe:
            exec:
              command: ["/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
            initialDelaySeconds: 25
            periodSeconds: 10
            timeout: 5
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: pricing
spec:
  selector: { app: kafka }
  ports:
    - { name: client,     port: 9092, targetPort: 9092 }
    - { name: controller, port: 9093, targetPort: 9093 }
