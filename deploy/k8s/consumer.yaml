# 4 consumers spécialisés — un Deployment par CONSUMER_TYPE.
# Ils partagent la même image mais scalent indépendamment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-orders
  namespace: pricing
spec:
  replicas: 1
  selector:
    matchLabels: { app: consumer-orders }
  template:
    metadata:
      labels: { app: consumer-orders }
    spec:
      containers:
        - name: consumer
          image: <REGISTRY>/mock-pricing-stream:0.1.0
          command: ["python", "-m", "app.streaming.consumer"]
          env:
            - { name: CONSUMER_TYPE,   value: "orders" }
            - { name: KAFKA_BOOTSTRAP, value: "kafka:9092" }
            - { name: REDIS_URL,       value: "redis://redis:6379/0" }
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
